name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Publish
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish src/CStoValuation.App/CStoValuation.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none -p:DebugSymbols=false -p:Version=$version `
            -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/CStoValuation.App.exe -DestinationPath "CStoValuation-${{ github.ref_name }}-win-x64.zip"

      - name: Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "CStoValuation-${{ github.ref_name }}-win-x64.zip" --title "${{ github.ref_name }}" --generate-notes
